<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能家居控制中心 - 华为云IoTDA</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
            overflow: hidden;
            padding: 20px 24px 32px;
            transition: all 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 8px 0;
            color: #1e2a3e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h1 small {
            font-size: 0.8rem;
            background: #eef2ff;
            color: #3b82f6;
            padding: 4px 10px;
            border-radius: 40px;
            font-weight: normal;
        }
        .sub {
            color: #5b6e8c;
            font-size: 0.85rem;
            margin-bottom: 24px;
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
        }
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .sensor-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 14px 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            transition: 0.1s;
        }
        .sensor-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4a5b7a;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sensor-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0f172a;
            line-height: 1.2;
        }
        .unit {
            font-size: 0.9rem;
            font-weight: normal;
            color: #5b6e8c;
        }
        .status-badge {
            display: inline-block;
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .control-group {
            background: #ffffff;
            border-radius: 28px;
            margin-bottom: 20px;
            padding: 8px 0;
            border: 1px solid #eef2f6;
        }
        .control-title {
            font-weight: 600;
            padding: 12px 20px 6px;
            color: #1e2a3e;
            display: flex;
            justify-content: space-between;
        }
        .button-group {
            display: flex;
            gap: 12px;
            padding: 8px 20px 20px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            background: #f1f5f9;
            border: none;
            padding: 12px 8px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e2a3e;
            cursor: pointer;
            transition: 0.15s;
            text-align: center;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 2px 6px rgba(59,130,246,0.2);
        }
        .btn-primary:active {
            background: #2563eb;
            transform: scale(0.97);
        }
        .btn-warning {
            background: #f97316;
            color: white;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .online {
            background: #10b981;
            box-shadow: 0 0 0 2px rgba(16,185,129,0.3);
        }
        .offline {
            background: #94a3b8;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #7e8aa2;
            margin-top: 24px;
            border-top: 1px solid #eef2f6;
            padding-top: 18px;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</head>
<body>
<div class="card" id="app">
    <h1>🏠 智能家居 <small>华为云IoTDA</small></h1>
    <div class="sub">
        <span class="status-led" id="connStatusLed"></span>
        <span id="connStatusText">连接中...</span>
    </div>

    <!-- 传感器数据 -->
    <div class="sensor-grid">
        <div class="sensor-item">
            <div class="sensor-label">🌡️ 温度</div>
            <div class="sensor-value"><span id="temp">--</span><span class="unit">°C</span></div>
        </div>
        <div class="sensor-item">
            <div class="sensor-label">💧 湿度</div>
            <div class="sensor-value"><span id="hum">--</span><span class="unit">%</span></div>
        </div>
        <div class="sensor-item">
            <div class="sensor-label">🌱 土壤湿度</div>
            <div class="sensor-value"><span id="soil">--</span><span class="unit"></span></div>
        </div>
        <div class="sensor-item">
            <div class="sensor-label">🚶 人体红外</div>
            <div class="sensor-value"><span id="motion">--</span></div>
        </div>
    </div>

    <!-- 灯模式控制 -->
    <div class="control-group">
        <div class="control-title">
            💡 灯光模式
            <span id="lightStatusBadge" class="status-badge">未知</span>
        </div>
        <div class="button-group">
            <button class="btn" data-light="0">关闭</button>
            <button class="btn" data-light="1">常亮</button>
            <button class="btn" data-light="2">闪烁</button>
        </div>
    </div>

    <!-- 报警开关 -->
    <div class="control-group">
        <div class="control-title">
            🔔 报警开关
            <span id="alarmBadge" class="status-badge">未知</span>
        </div>
        <div class="button-group">
            <button class="btn" data-alarm="0">关闭报警</button>
            <button class="btn btn-warning" data-alarm="1">开启报警</button>
        </div>
    </div>

    <!-- 系统总开关 -->
    <div class="control-group">
        <div class="control-title">
            ⚙️ 系统总开关
            <span id="systemBadge" class="status-badge">未知</span>
        </div>
        <div class="button-group">
            <button class="btn" data-system="0">关闭系统</button>
            <button class="btn btn-primary" data-system="1">开启系统</button>
        </div>
    </div>

    <footer>
        🌟 数据每5秒自动刷新 · 通过华为云API下发指令
    </footer>
</div>
<div id="toast" class="toast">操作成功</div>

<script>
    // ========== 华为云配置（已替换为您提供的凭证） ==========
    const CONFIG = {
        region: 'cn-north-4',
        projectId: '59acabce9316451790920d7851e659cb',
        deviceId: '69a7d565cbb0cf6bb943b9b9_ZHANG',   // 与 ESP32 代码保持一致
        ak: 'HPUAPIWV8PIYEF7BI7EH',
        sk: 'eCXGlgyPEDX7K0AzkS6essxSGCGSFqc5dcz0nzL4'
    };

    // 动态构建 API 基础地址
    CONFIG.iotEndpoint = `https://iotda.${CONFIG.region}.myhuaweicloud.com/v5/iot/${CONFIG.projectId}/devices/${CONFIG.deviceId}`;

    // ========== 华为云 API 签名工具 (AK/SK) ==========
    function hmacSha256(key, data) {
        return CryptoJS.HmacSHA256(data, key).toString(CryptoJS.enc.Hex);
    }

    function sha256(data) {
        return CryptoJS.SHA256(data).toString(CryptoJS.enc.Hex);
    }

    function buildCanonicalRequest(method, uri, queryParams, headers, body) {
        let canonicalHeaders = '';
        const signedHeaders = [];
        for (const [k, v] of Object.entries(headers)) {
            const lowerKey = k.toLowerCase();
            canonicalHeaders += `${lowerKey}:${v.trim()}\n`;
            signedHeaders.push(lowerKey);
        }
        const signedHeadersStr = signedHeaders.join(';');
        const payloadHash = sha256(body || '');
        return `${method}\n${uri}\n${queryParams}\n${canonicalHeaders}\n${signedHeadersStr}\n${payloadHash}`;
    }

    function buildStringToSign(algorithm, canonicalRequest, timestamp) {
        return `${algorithm}\n${timestamp}\n${sha256(canonicalRequest)}`;
    }

    async function callHuaweiAPI(method, path, body = null) {
        const timestamp = new Date().toISOString().replace(/[:\-]|\.\d{3}/g, '');
        const uri = path;
        const queryParams = '';
        const headers = {
            'Content-Type': 'application/json',
            'X-Sdk-Date': timestamp,
            'Host': new URL(CONFIG.iotEndpoint).host
        };
        if (body) headers['Content-Length'] = Buffer.byteLength(body);

        const canonicalRequest = buildCanonicalRequest(method, uri, queryParams, headers, body || '');
        const algorithm = 'SDK-HMAC-SHA256';
        const stringToSign = buildStringToSign(algorithm, canonicalRequest, timestamp);
        const signingKey = CONFIG.sk;
        const signature = hmacSha256(signingKey, stringToSign);
        headers['Authorization'] = `${algorithm} Access=${CONFIG.ak}, SignedHeaders=content-type;host;x-sdk-date, Signature=${signature}`;

        const url = `${CONFIG.iotEndpoint}${path}`;
        const response = await fetch(url, {
            method,
            headers,
            body: body ? body : undefined
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`API调用失败 ${response.status}: ${errText}`);
        }
        return await response.json();
    }

    // ========== 获取设备影子/属性 ==========
    async function fetchDeviceData() {
        try {
            const data = await callHuaweiAPI('GET', '/shadow');
            const reported = data.shadow?.[0]?.reported?.properties || {};
            updateUI(reported);
            updateConnectionStatus(true);
        } catch (err) {
            console.error('获取设备数据失败', err);
            updateConnectionStatus(false);
            showToast('获取数据失败: ' + err.message);
        }
    }

    // ========== 下发设备命令 ==========
    async function sendCommand(paras) {
        const commandBody = {
            service_id: '亮少',
            command_name: 'control',
            paras: paras
        };
        try {
            const result = await callHuaweiAPI('POST', '/commands', JSON.stringify(commandBody));
            console.log('命令下发成功', result);
            showToast('指令已发送');
            setTimeout(() => fetchDeviceData(), 500);
        } catch (err) {
            console.error('命令下发失败', err);
            showToast('指令发送失败: ' + err.message);
        }
    }

    // ========== UI 更新 ==========
    function updateUI(reported) {
        document.getElementById('temp').innerText = reported.temperature ?? '--';
        document.getElementById('hum').innerText = reported.humidity ?? '--';
        document.getElementById('soil').innerText = reported.soil ?? '--';
        const motionVal = reported.motion === 1 ? '检测到人' : (reported.motion === 0 ? '无人' : '--');
        document.getElementById('motion').innerHTML = motionVal;

        const light = reported.LightStatus;
        const lightText = light === 0 ? '关闭' : (light === 1 ? '常亮' : (light === 2 ? '闪烁' : '未知'));
        document.getElementById('lightStatusBadge').innerText = lightText;

        const alarm = reported.Alarm;
        const alarmText = alarm === 1 ? '已启用' : (alarm === 0 ? '已禁用' : '未知');
        document.getElementById('alarmBadge').innerText = alarmText;

        const system = reported.System;
        const systemText = system === 1 ? '运行中' : (system === 0 ? '已停止' : '未知');
        document.getElementById('systemBadge').innerText = systemText;
    }

    function updateConnectionStatus(online) {
        const led = document.getElementById('connStatusLed');
        const textSpan = document.getElementById('connStatusText');
        if (online) {
            led.className = 'status-led online';
            textSpan.innerText = '设备在线';
        } else {
            led.className = 'status-led offline';
            textSpan.innerText = '离线 / 获取失败';
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, 2000);
    }

    // ========== 事件绑定 ==========
    function bindEvents() {
        document.querySelectorAll('[data-light]').forEach(btn => {
            btn.addEventListener('click', () => {
                const val = parseInt(btn.getAttribute('data-light'));
                sendCommand({ LightStatus: val });
            });
        });
        document.querySelectorAll('[data-alarm]').forEach(btn => {
            btn.addEventListener('click', () => {
                const val = parseInt(btn.getAttribute('data-alarm'));
                sendCommand({ Alarm: val });
            });
        });
        document.querySelectorAll('[data-system]').forEach(btn => {
            btn.addEventListener('click', () => {
                const val = parseInt(btn.getAttribute('data-system'));
                sendCommand({ System: val });
            });
        });
    }

    // ========== 轮询 ==========
    let intervalId = null;
    function startPolling() {
        if (intervalId) clearInterval(intervalId);
        fetchDeviceData();
        intervalId = setInterval(fetchDeviceData, 5000);
    }

    // ========== 初始化 ==========
    window.addEventListener('load', () => {
        bindEvents();
        startPolling();
    });
</script>
</body>
</html>
